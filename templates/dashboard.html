<!DOCTYPE html>
<html>
<head>
    <title>DebugSphere Dashboard</title>
</head>
<body>
    <h2>API Logs Dashboard</h2>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Endpoint</th>
            <th>Method</th>
            <th>Status</th>
            <th>Timestamp</th>
        </tr>
        {% for log in logs %}
        <tr>
            <td>{{ log[0] }}</td>
            <td>{{ log[1] }}</td>
            <td>{{ log[2] }}</td>
            <td>{{ log[3] }}</td>
            <td>{{ log[4] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
